name: Build Windows exe

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # Spec sanity-checked in the Linux sandbox (produces a Linux ELF
      # there, not a usable artifact, but proves Analysis/hidden-imports/
      # data collection all resolve). Real .exe verification is Windows-only
      # (see docs/manual_test_windows.md); this workflow provides that build.
      - name: Build single-file windowed exe
        run: pyinstaller --clean --noconfirm heli_noise.spec

      # TODO (future): application icon + version resource; exclude unused
      # Qt modules to shrink the exe. Not required for a working build.

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeliNoiseAnalyzer-windows
          path: dist/HeliNoiseAnalyzer.exe
